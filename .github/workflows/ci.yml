name: CI

# Runs on every push to main and every PR targeting it. Validates the plugin the
# same way local dev does (see sanitizer/DEV_NOTES.md sec 4), but in one unified
# environment: PyQt6 + buzz cloned alongside, so both the pure-core suite and the
# host-integration suite (menu/pipeline/review-window) run in a single pass. No
# ML deps (torch/transformers/etc.) are installed -- the real-model test stays
# opt-in behind SANITIZER_RUN_MODEL_TEST and is skipped here on purpose.

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Sanitizer
        uses: actions/checkout@v4

      # Host-integration tests (menu/pipeline/review-window) import buzz.* and
      # importorskip if it's absent -- without this they'd silently skip instead
      # of running. buzz/ is gitignored here (upstream app, never vendored), so it
      # has to be fetched separately, mirroring the local dev setup.
      - name: Check out upstream Buzz
        uses: actions/checkout@v4
        with:
          repository: chidiwilliams/buzz
          path: buzz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # PyQt6's pip wheel needs these system libs to init even headlessly on
      # Ubuntu -- verified empirically (a bare runner fails on libGL.so.1 missing,
      # then libxkbcommon.so.0, then libEGL.so.1, then libglib-2.0.so.0, ...).
      - name: Install headless Qt runtime libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgl1 libxkbcommon0 libegl1 libdbus-1-3 libfontconfig1 \
            libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libxi6 libxrender1 libsm6 libice6 \
            libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-qt PyQt6 hypothesis markdown platformdirs ruff

      - name: Lint
        run: |
          ruff check sanitizer tools
          ruff format --check sanitizer tools

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest sanitizer -q

      # Packaging smoke test on every push/PR, not just on release -- catches a
      # broken zip (missing file, bad exclusion rule) before it ever reaches a tag.
      - name: Build the plugin zip
        run: python tools/package.py

      - name: Upload the built zip
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-zip-${{ github.sha }}
          path: dist/sanitizer.zip
          retention-days: 14
