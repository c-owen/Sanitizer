document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"dd926ae6-72a8-4cfb-96e0-4f9e5f201ead\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n  *{box-sizing:border-box;margin:0;padding:0;}\n  html,body{background:#cfcdc9;font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,system-ui,sans-serif;color:#1d1c1a;-webkit-font-smoothing:antialiased;}\n  ::selection{background:#b9cbe0;}\n  button{font-family:inherit;}\n  select{font-family:inherit;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:26px 18px 60px;\">\n<div style=\"width:1160px;max-width:100%;border:1px solid #807c76;background:#f2f1ef;box-shadow:0 1px 0 #fff inset;font-size:13px;\">\n\n  <!-- ===== TITLE BAR ===== -->\n  <div style=\"display:flex;align-items:center;justify-content:space-between;background:#e4e2de;border-bottom:1px solid #b9b6b1;padding:5px 10px;\">\n    <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#3a3833;\">\n      <span style=\"font-size:13px;\">▣<\u002Fspan><span>Sanitizer — Apollo kickoff transcript.txt<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:14px;color:#6b6864;font-size:12px;\">\n      <span>—<\u002Fspan><span>▢<\u002Fspan><span>✕<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== MENU BAR ===== -->\n  <div style=\"display:flex;gap:2px;background:#efeeec;border-bottom:1px solid #c7c4bf;padding:2px 6px;font-size:12.5px;\">\n    <span style=\"padding:3px 9px;color:#3a3833;\">File<\u002Fspan>\n    <span style=\"padding:3px 9px;color:#3a3833;\">Edit<\u002Fspan>\n    <span style=\"padding:3px 9px;color:#3a3833;\">View<\u002Fspan>\n    <span style=\"padding:3px 9px;color:#1d1c1a;font-weight:700;background:#dad7d1;border:1px solid #bdb9b3;\">Sanitizer<\u002Fspan>\n    <span style=\"padding:3px 9px;color:#3a3833;\">Help<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- ===== TOOLBAR: transcript selector + demo toggle ===== -->\n  <div style=\"display:flex;align-items:center;justify-content:space-between;background:#f2f1ef;border-bottom:1px solid #cdcac5;padding:7px 12px;\">\n    <div style=\"display:flex;align-items:center;gap:8px;\">\n      <span style=\"font-size:11px;color:#6b6864;\">Transcript:<\u002Fspan>\n      <select style=\"font-size:12px;padding:3px 6px;border:1px solid #9a968f;background:#fff;color:#1d1c1a;\">\n        <option>Apollo kickoff — 2026-06-29<\u002Foption>\n        <option>Northwind QBR — 2026-06-22<\u002Foption>\n        <option>Standup — 2026-06-30<\u002Foption>\n      <\u002Fselect>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:9px;\">\n      <span style=\"font-size:10px;letter-spacing:.06em;color:#8a8680;text-transform:uppercase;\">Demo state · prototype only<\u002Fspan>\n      <div style=\"display:flex;border:1px solid #9a968f;\">\n        <button onclick=\"{{ demoSafe }}\" style=\"{{ segSafe }}\">Safe<\u002Fbutton>\n        <button onclick=\"{{ demoUnsafe }}\" style=\"{{ segUnsafe }}\">Unsafe<\u002Fbutton>\n        <button onclick=\"{{ demoEmpty }}\" style=\"{{ segEmpty }}\">Empty<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== SAFETY SPINE ===== -->\n  <sc-if value=\"{{ isSafe }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"display:flex;align-items:center;gap:12px;background:#e9f1ea;border-bottom:1px solid #b9b6b1;border-left:7px solid #2f6b3d;padding:10px 16px;\">\n      <span style=\"font-size:18px;color:#2f6b3d;\">✔<\u002Fspan>\n      <span style=\"font-weight:700;letter-spacing:.02em;\">SAFE TO COPY<\u002Fspan>\n      <span style=\"color:#4a4843;\">· 9 removed · 2 suggestions awaiting you<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n  <sc-if value=\"{{ isUnsafe }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;align-items:center;gap:14px;background:#3a1c1c;border-top:1px solid #000;border-bottom:3px solid #b3261e;border-left:7px solid #b3261e;padding:14px 16px;color:#ffe6e1;\">\n      <span style=\"font-size:24px;\">⛔<\u002Fspan>\n      <span style=\"font-weight:800;letter-spacing:.06em;font-size:15px;\">BLOCKED — UNSAFE<\u002Fspan>\n      <span style=\"color:#f3c5bf;letter-spacing:.01em;\">— could not confirm your declared items were removed<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n  <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;align-items:center;gap:12px;background:#eaf0f2;border-bottom:1px solid #b9b6b1;border-left:7px solid #4a6b7a;padding:10px 16px;\">\n      <span style=\"font-size:18px;color:#4a6b7a;\">✔<\u002Fspan>\n      <span style=\"font-weight:700;letter-spacing:.02em;\">NOTHING SENSITIVE FOUND<\u002Fspan>\n      <span style=\"color:#4a4843;\">in this transcript<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== MODE TABS ===== -->\n  <div style=\"display:flex;gap:3px;padding:8px 12px 0;background:#e2e0dc;border-bottom:1px solid #b9b6b1;\">\n    <button onclick=\"{{ goReview }}\" style=\"{{ tabReview }}\">Review<\u002Fbutton>\n    <button onclick=\"{{ goSend }}\" style=\"{{ tabSend }}\">Send out<\u002Fbutton>\n    <button onclick=\"{{ goRestore }}\" style=\"{{ tabRestore }}\">Restore<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- ===================== BODY ===================== -->\n  <div style=\"background:#f2f1ef;min-height:560px;\">\n\n  <!-- ---------- MODE: REVIEW ---------- -->\n  <sc-if value=\"{{ isReview }}\" hint-placeholder-val=\"{{ true }}\">\n\n    <!-- EMPTY review body -->\n    <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:46px 40px;display:flex;flex-direction:column;align-items:center;text-align:center;\">\n        <div style=\"font-size:40px;color:#4a6b7a;margin-bottom:6px;\">✔<\u002Fdiv>\n        <div style=\"font-size:18px;font-weight:700;margin-bottom:8px;\">Nothing sensitive found<\u002Fdiv>\n        <div style=\"color:#5a5853;max-width:460px;line-height:1.5;margin-bottom:18px;\">Sanitizer ran completely and found no sensitive items. This is a result, not a skip.<\u002Fdiv>\n        <div style=\"border:1px solid #b9b6b1;background:#fbfbfa;padding:12px 18px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:#3a3833;margin-bottom:22px;\">\n          Scanned 14 detectors across 36 segments · 0 matches · key not needed\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap;justify-content:center;\">\n          <button onclick=\"{{ copyTranscript }}\" style=\"padding:8px 16px;border:1px solid #6f6b65;background:#dcdad5;font-weight:600;cursor:pointer;color:#1d1c1a;\">Copy the transcript<\u002Fbutton>\n          <button onclick=\"{{ toggleScan }}\" style=\"padding:8px 16px;border:1px solid #9a968f;background:#fbfbfa;cursor:pointer;color:#1d1c1a;\">Scan for misses {{ scanGlyph }}<\u002Fbutton>\n          <button onclick=\"{{ editList }}\" style=\"padding:8px 16px;border:1px solid #9a968f;background:#fbfbfa;cursor:pointer;color:#1d1c1a;\">Edit my declared list<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- SAFE / UNSAFE review body: master-detail split -->\n    <sc-if value=\"{{ showReviewList }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n\n      <!-- Unsafe blocking strip inside review -->\n      <sc-if value=\"{{ isUnsafe }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#2a1414;color:#ffe6e1;border-bottom:2px solid #b3261e;padding:11px 16px;display:flex;gap:10px;align-items:center;font-size:12.5px;\">\n          <span style=\"font-size:16px;\">⛔<\u002Fspan>\n          <span><strong style=\"letter-spacing:.04em;\">OUTPUT WITHHELD.<\u002Fstrong> A declared item could not be confirmed removed (see ⚠ below). No scrubbed text is produced until this is resolved.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- top-of-list bulk action -->\n      <div style=\"display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #cdcac5;\">\n        <button onclick=\"{{ approveAll }}\" style=\"padding:7px 14px;border:1px solid #6f6b65;background:#dcdad5;font-weight:600;cursor:pointer;color:#1d1c1a;\">Approve everything detected<\u002Fbutton>\n        <select style=\"font-size:11.5px;padding:4px 6px;border:1px solid #9a968f;background:#fff;color:#3a3833;\">\n          <option>filter: all detected<\u002Foption>\n          <option>approve all from my list<\u002Foption>\n          <option>approve all phone numbers<\u002Foption>\n          <option>approve all emails<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:stretch;\">\n\n        <!-- LEFT: decision list -->\n        <div style=\"width:486px;flex:0 0 486px;border-right:1px solid #b9b6b1;display:flex;flex-direction:column;\">\n\n          <!-- REMOVED zone -->\n          <div style=\"background:#eceae6;border-bottom:1px solid #c7c4bf;padding:8px 12px;display:flex;align-items:baseline;gap:8px;\">\n            <span style=\"font-size:14px;\">▣<\u002Fspan>\n            <span style=\"font-weight:800;letter-spacing:.03em;\">REMOVED<\u002Fspan>\n            <span style=\"color:#6b6864;font-size:11.5px;\">— guaranteed · declared + detected, verified<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"background:#fff;\">\n            <sc-for list=\"{{ removedRows }}\" as=\"r\" hint-placeholder-count=\"9\">\n              <div onclick=\"{{ r.onSelect }}\" style=\"{{ r.rowStyle }}\">\n                <span style=\"font-size:13px;color:#2f6b3d;\">{{ r.glyph }}<\u002Fspan>\n                <span style=\"display:flex;flex-direction:column;gap:1px;min-width:0;\">\n                  <span style=\"font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;font-weight:600;\">{{ r.ph }}<\u002Fspan>\n                  <span style=\"color:#6b6864;font-size:11px;\">was: {{ r.val }}<\u002Fspan>\n                <\u002Fspan>\n                <span style=\"color:#6b6864;font-size:11px;text-align:right;\">{{ r.count }}×<\u002Fspan>\n                <sc-if value=\"{{ r.unconfirmed }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"font-size:10.5px;font-weight:700;color:#b3261e;border:1px solid #b3261e;padding:1px 6px;white-space:nowrap;\">⚠ NOT CONFIRMED<\u002Fspan>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ r.confirmed }}\" hint-placeholder-val=\"{{ true }}\">\n                  <span style=\"font-size:10.5px;color:#6b6864;background:#f0eee9;border:1px solid #d8d4ce;padding:1px 7px;white-space:nowrap;\">{{ r.prov }}<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- SUGGESTIONS zone (inset, lighter) -->\n          <div style=\"background:#f4f2ee;border-top:1px solid #b9b6b1;border-bottom:1px solid #ddd9d3;padding:8px 12px 8px 24px;\">\n            <div style=\"display:flex;align-items:baseline;gap:8px;\">\n              <span style=\"font-size:13px;color:#8a8680;\">◇<\u002Fspan>\n              <span style=\"font-weight:700;letter-spacing:.03em;color:#4a4843;\">SUGGESTIONS<\u002Fspan>\n              <span style=\"color:#8a8680;font-size:11.5px;\">— model's guesses, your call<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"color:#8a8680;font-size:11px;font-style:italic;margin-top:3px;\">not guaranteed — nothing here is removed until you approve it<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#faf9f6;\">\n            <sc-for list=\"{{ suggRows }}\" as=\"r\" hint-placeholder-count=\"2\">\n              <div onclick=\"{{ r.onSelect }}\" style=\"{{ r.rowStyle }}\">\n                <span style=\"font-size:13px;color:#8a8680;\">{{ r.glyph }}<\u002Fspan>\n                <span style=\"display:flex;flex-direction:column;gap:1px;min-width:0;\">\n                  <span style=\"font-weight:600;font-size:12.5px;\">{{ r.name }}<\u002Fspan>\n                  <span style=\"color:#8a8680;font-size:11px;\">{{ r.kind }} · {{ r.count }}× · {{ r.statusLabel }}<\u002Fspan>\n                <\u002Fspan>\n                <sc-if value=\"{{ r.decided }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"font-size:11px;color:#6b6864;font-style:italic;\">decided<\u002Fspan>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ r.pending }}\" hint-placeholder-val=\"{{ true }}\">\n                  <span style=\"display:flex;gap:5px;\">\n                    <button onclick=\"{{ r.onApprove }}\" style=\"padding:4px 9px;border:1px solid #6f6b65;background:#e3e1dc;font-size:11px;font-weight:600;cursor:pointer;color:#1d1c1a;\">Approve<\u002Fbutton>\n                    <button onclick=\"{{ r.onReject }}\" style=\"padding:4px 9px;border:1px solid #9a968f;background:#fbfbfa;font-size:11px;cursor:pointer;color:#3a3833;\">Reject<\u002Fbutton>\n                  <\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- Keeping in cleartext (collapsed) -->\n          <div onclick=\"{{ toggleCleartext }}\" style=\"background:#efeeec;border-top:1px solid #c7c4bf;padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;color:#5a5853;font-size:12px;\">\n            <span>{{ cleartextCaret }}<\u002Fspan><span>Keeping in cleartext (1)<\u002Fspan>\n          <\u002Fdiv>\n          <sc-if value=\"{{ cleartextOpen }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#f7f6f3;border-top:1px solid #ddd9d3;padding:8px 12px 8px 24px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;font-size:12.5px;\">\n              <span><span style=\"text-decoration:line-through;color:#8a8680;\">Q3<\u002Fspan> <span style=\"color:#8a8680;font-size:11px;\">· date · 2× · Kept<\u002Fspan><\u002Fspan>\n              <button onclick=\"{{ removeQ3 }}\" style=\"padding:4px 10px;border:1px solid #6f6b65;background:#e3e1dc;font-size:11px;cursor:pointer;color:#1d1c1a;\">Remove after all<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- reverse miss-catching strip -->\n          <div style=\"margin-top:auto;background:#f0efec;border-top:1px solid #b9b6b1;padding:10px 12px;\">\n            <div style=\"display:flex;align-items:center;gap:7px;color:#4a4843;font-size:11.5px;margin-bottom:7px;\">\n              <span style=\"font-size:13px;\">⚲<\u002Fspan>\n              <span style=\"font-weight:600;\">Not touched, but entity-shaped — confirm these are fine:<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px;align-items:center;\">\n              <span style=\"border:1px solid #cbc7c1;background:#fff;padding:3px 9px;font-size:12px;\">\"Karen\" <span style=\"color:#8a8680;\">(1)<\u002Fspan><\u002Fspan>\n              <button onclick=\"{{ redactKaren }}\" style=\"padding:4px 10px;border:1px solid #6f6b65;background:#e3e1dc;font-size:11px;font-weight:600;cursor:pointer;color:#1d1c1a;\">Redact + add<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n\n        <!-- splitter handle -->\n        <div style=\"width:5px;flex:0 0 5px;background:#dcdad5;border-right:1px solid #b9b6b1;cursor:col-resize;\"><\u002Fdiv>\n\n        <!-- RIGHT: context / side-by-side -->\n        <div style=\"flex:1;min-width:0;padding:14px 16px;display:flex;flex-direction:column;gap:12px;\">\n\n          <sc-if value=\"{{ isUnsafe }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"border:2px solid #b3261e;background:#fbeae8;padding:16px;color:#7a1c14;\">\n              <div style=\"font-weight:800;letter-spacing:.04em;margin-bottom:6px;\">⛔ CONTEXT WITHHELD<\u002Fdiv>\n              <div style=\"font-size:12.5px;line-height:1.5;\">Substitution preview is not rendered while a declared item is unconfirmed. Resolve {{ projEl }} in the list to restore the side-by-side and enable output.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ showDetail }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-direction:column;gap:12px;\">\n            <sc-if value=\"{{ detail.has }}\" hint-placeholder-val=\"{{ true }}\">\n            <div>\n              <!-- meta -->\n              <div style=\"border:1px solid #c7c4bf;background:#fbfbfa;\">\n                <div style=\"padding:9px 12px;border-bottom:1px solid #e3e1dc;display:flex;align-items:baseline;gap:8px;\">\n                  <span style=\"font-weight:700;font-size:14px;\">{{ detail.value }}<\u002Fspan>\n                  <span style=\"color:#6b6864;font-size:11.5px;\">{{ detail.kind }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:auto 1fr;gap:4px 14px;padding:10px 12px;font-size:12px;\">\n                  <span style=\"color:#8a8680;\">provenance<\u002Fspan><span>{{ detail.prov }}<\u002Fspan>\n                  <span style=\"color:#8a8680;\">placeholder<\u002Fspan><span style=\"font-family:ui-monospace,Menlo,monospace;\">{{ detail.scrubPh }}<\u002Fspan>\n                  <span style=\"color:#8a8680;\">occurrences<\u002Fspan><span>{{ detail.occ }}<\u002Fspan>\n                  <span style=\"color:#8a8680;\">why flagged<\u002Fspan><span>{{ detail.why }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- side by side -->\n              <div style=\"font-size:11px;color:#6b6864;margin:12px 0 6px;\">Is removing this one correct?<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;\">\n                <div style=\"border:1px solid #c7c4bf;background:#fff;\">\n                  <div style=\"padding:5px 9px;border-bottom:1px solid #e3e1dc;background:#f4f2ee;font-size:10.5px;letter-spacing:.05em;color:#6b6864;text-transform:uppercase;\">Original<\u002Fdiv>\n                  <div style=\"padding:10px;font-size:12.5px;line-height:1.55;\">{{ detail.pre }}<span style=\"background:#f3d9d4;border-bottom:2px solid #b3261e;padding:0 2px;\">{{ detail.match }}<\u002Fspan>{{ detail.post }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"border:1px solid #c7c4bf;background:#fff;\">\n                  <div style=\"padding:5px 9px;border-bottom:1px solid #e3e1dc;background:#eef2ee;font-size:10.5px;letter-spacing:.05em;color:#6b6864;text-transform:uppercase;\">{{ detail.afterLabel }}<\u002Fdiv>\n                  <div style=\"padding:10px;font-size:12.5px;line-height:1.55;\">{{ detail.pre }}<span style=\"background:#dfe9df;border-bottom:2px solid #2f6b3d;padding:0 2px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;\">{{ detail.scrubPh }}<\u002Fspan>{{ detail.post }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ detailEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"color:#8a8680;font-size:12.5px;padding:8px 2px;\">Select a row to compare the original sentence against the substitution.<\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- context tools -->\n            <div style=\"border-top:1px solid #ddd9d3;padding-top:12px;display:flex;flex-direction:column;gap:9px;\">\n              <button onclick=\"{{ toggleScan }}\" style=\"align-self:flex-start;padding:6px 12px;border:1px solid #9a968f;background:#fbfbfa;font-size:12px;cursor:pointer;color:#1d1c1a;\">Scan for misses {{ scanGlyph }}<\u002Fbutton>\n              <div style=\"border:1px dashed #b9b6b1;background:#f7f6f3;padding:10px 12px;font-size:12px;\">\n                <div style=\"color:#6b6864;margin-bottom:6px;\">On text selection — one gesture:<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;\">\n                  <span style=\"background:#e7eef6;padding:1px 4px;\">Karen<\u002Fspan>\n                  <button onclick=\"{{ redactSel }}\" style=\"padding:5px 11px;border:1px solid #6f6b65;background:#e3e1dc;font-size:11.5px;font-weight:600;cursor:pointer;color:#1d1c1a;\">Redact this everywhere<\u002Fbutton>\n                  <label style=\"display:flex;align-items:center;gap:5px;font-size:11.5px;color:#4a4843;cursor:pointer;\">\n                    <span>{{ redactAddGlyph }}<\u002Fspan>\n                    <span onclick=\"{{ toggleRedactAdd }}\">also always treat as sensitive (add to my list)<\u002Fspan>\n                  <\u002Flabel>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fsc-if>\n\n  <!-- ---------- MODE: SEND OUT ---------- -->\n  <sc-if value=\"{{ isSend }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:34px 40px;max-width:760px;margin:0 auto;\">\n\n      <sc-if value=\"{{ isUnsafe }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"border:3px solid #b3261e;background:#2a1414;color:#ffe6e1;padding:26px;text-align:center;\">\n          <div style=\"font-size:34px;margin-bottom:8px;\">⛔<\u002Fdiv>\n          <div style=\"font-size:17px;font-weight:800;letter-spacing:.05em;margin-bottom:8px;\">BLOCKED — UNSAFE<\u002Fdiv>\n          <div style=\"font-size:13px;line-height:1.55;color:#f3c5bf;max-width:440px;margin:0 auto;\">Sanitizer could not confirm a declared item was removed, so <strong>no scrubbed text exists to copy<\u002Fstrong>. There is nothing selectable on this screen. Resolve the flagged item in Review first.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ sendEnabled }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n        <div style=\"text-align:center;margin-bottom:8px;\">\n          <button onclick=\"{{ copyScrubbed }}\" style=\"padding:18px 34px;font-size:16px;font-weight:700;border:1px solid #2f6b3d;background:#e9f1ea;cursor:pointer;color:#1d1c1a;display:inline-flex;align-items:center;gap:10px;\">\n            <span style=\"font-size:20px;\">📋<\u002Fspan> Copy scrubbed text\n          <\u002Fbutton>\n          <div style=\"color:#6b6864;font-size:12px;margin-top:9px;\">This is the safe thing to paste into your LLM.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div onclick=\"{{ togglePreview }}\" style=\"margin:22px 0 0;cursor:pointer;color:#4a4843;font-size:12.5px;display:flex;align-items:center;gap:7px;\">\n          <span>{{ previewCaret }}<\u002Fspan><span>Preview scrubbed text<\u002Fspan>\n        <\u002Fdiv>\n        <sc-if value=\"{{ previewOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"border:1px solid #c7c4bf;background:#fff;padding:12px;margin-top:8px;font-family:ui-monospace,Menlo,monospace;font-size:12px;line-height:1.6;color:#3a3833;\">{{ previewEl }}<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"height:1px;background:#c7c4bf;margin:26px 0;\"><\u002Fdiv>\n\n        <!-- fenced KEY block -->\n        <div style=\"border:2px solid #6f6b65;background:#efeeec;\">\n          <div style=\"background:#1d1c1a;color:#f2f1ef;padding:10px 14px;display:flex;align-items:center;gap:9px;\">\n            <span style=\"font-size:16px;\">🔒<\u002Fspan>\n            <span style=\"font-weight:800;letter-spacing:.04em;\">THE KEY — this is the secret.<\u002Fspan>\n            <span style=\"color:#c9c6c0;font-weight:500;\">Never paste this into an LLM.<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:14px;\">\n            <div style=\"font-size:12px;color:#5a5853;line-height:1.5;margin-bottom:12px;\">The scrubbed text above is safe to share. This key maps the placeholders back to the real values — it is the one thing to protect.<\u002Fdiv>\n\n            <sc-if value=\"{{ showKeyNote }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"border:1px solid #b08a2e;background:#fbf3df;padding:10px 12px;font-size:12px;color:#5a4a1e;display:flex;justify-content:space-between;gap:12px;margin-bottom:12px;\">\n                <span>💡 First time here: remember — <strong>the key is the secret<\u002Fstrong>. Share the scrubbed text freely; guard this key.<\u002Fspan>\n                <span onclick=\"{{ dismissKeyNote }}\" style=\"cursor:pointer;font-weight:700;\">✕<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ keyHidden }}\" hint-placeholder-val=\"{{ true }}\">\n              <button onclick=\"{{ revealKey }}\" style=\"padding:8px 14px;border:1px solid #6f6b65;background:#dcdad5;font-size:12.5px;cursor:pointer;color:#1d1c1a;\">🔒 Reveal the key<\u002Fbutton>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ keyRevealed }}\" hint-placeholder-val=\"{{ false }}\">\n              <div>\n                <div style=\"border:1px solid #b3261e;background:#fff;padding:11px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.7;color:#3a3833;\">\n                  <sc-for list=\"{{ keyMap }}\" as=\"k\" hint-placeholder-count=\"5\">\n                    <div>{{ k.phEl }} = {{ k.val }}<\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:12px;margin-top:10px;\">\n                  <button onclick=\"{{ copyKey }}\" style=\"padding:7px 13px;border:1px solid #b3261e;background:#fbeae8;font-size:12px;font-weight:600;cursor:pointer;color:#7a1c14;\">⚠ Copy the secret key<\u002Fbutton>\n                  <button onclick=\"{{ revealKey }}\" style=\"padding:7px 13px;border:1px solid #9a968f;background:#fbfbfa;font-size:12px;cursor:pointer;color:#3a3833;\">Hide key<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ---------- MODE: RESTORE ---------- -->\n  <sc-if value=\"{{ isRestore }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:30px 40px;max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:16px;\">\n      <div>\n        <div style=\"font-size:11px;letter-spacing:.05em;color:#6b6864;text-transform:uppercase;margin-bottom:6px;\">Paste the LLM reply<\u002Fdiv>\n        <div contenteditable=\"true\" style=\"width:100%;min-height:84px;border:1px solid #9a968f;background:#fff;padding:10px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;line-height:1.55;color:#1d1c1a;white-space:pre-wrap;outline:none;\">{{ restoreEl }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <button onclick=\"{{ doRestore }}\" style=\"padding:9px 18px;border:1px solid #6f6b65;background:#dcdad5;font-weight:600;cursor:pointer;color:#1d1c1a;\">Restore originals<\u002Fbutton>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:11px;letter-spacing:.05em;color:#6b6864;text-transform:uppercase;margin-bottom:6px;\">Result<\u002Fdiv>\n        <div style=\"border:1px solid #c7c4bf;background:#fbfbfa;padding:12px;font-size:13px;line-height:1.65;min-height:64px;\">\n          <sc-if value=\"{{ restored }}\" hint-placeholder-val=\"{{ false }}\">\n            <span><span style=\"background:#dfe9df;padding:0 2px;\">Jane Okafor<\u002Fspan> agreed to ship <span style=\"background:#dfe9df;padding:0 2px;\">Apollo<\u002Fspan> by Friday; loop in {{ orgEl }}.<\u002Fspan>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ notRestored }}\" hint-placeholder-val=\"{{ true }}\">\n            <span style=\"color:#8a8680;\">Click \"Restore originals\" to fill placeholders from your local key.<\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <sc-if value=\"{{ restored }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:8px;display:flex;flex-direction:column;gap:6px;\">\n            <div style=\"border:1px dashed #b9b6b1;background:#f7f6f3;padding:7px 10px;font-size:11.5px;color:#8a8680;\">Reserved — possible re-identification flag would appear here.<\u002Fdiv>\n            <div style=\"font-size:12px;color:#4a4843;\">2 placeholders filled · <span style=\"color:#b3261e;font-weight:600;\">⚠ 1 still unresolved in the text<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <\u002Fdiv><!-- /body -->\n\n  <!-- ===== Qt widget map (collapsed) ===== -->\n  <div style=\"border-top:1px solid #b9b6b1;background:#e9e7e3;\">\n    <div onclick=\"{{ toggleMap }}\" style=\"padding:8px 14px;cursor:pointer;font-size:12px;color:#5a5853;display:flex;align-items:center;gap:7px;\">\n      <span>{{ mapCaret }}<\u002Fspan><span>Qt widget map<\u002Fspan>\n    <\u002Fdiv>\n    <sc-if value=\"{{ mapOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:4px 16px 16px;font-size:11.5px;line-height:1.75;color:#4a4843;font-family:ui-monospace,Menlo,monospace;\">\n        window → QMainWindow<br>\n        menu bar → QMenuBar (Sanitizer menu active)<br>\n        transcript selector → QComboBox · demo toggle → QButtonGroup of QToolButton (prototype-only)<br>\n        safety spine → QFrame + QLabel (word + glyph, not color)<br>\n        mode tabs (Review/Send out/Restore) → QTabWidget / QStackedWidget<br>\n        review split → QSplitter(Horizontal)<br>\n        decision list → QTreeWidget, collapsible top-level group items (Removed / Suggestions / Keeping in cleartext)<br>\n        bulk action + filter → QPushButton + QComboBox<br>\n        suggestion Approve/Reject → QPushButton per row<br>\n        miss-catching strip → QFrame + QLabel + small list + QPushButton<br>\n        context pane → two read-only QPlainTextEdit side by side (original vs substituted)<br>\n        scan-for-misses → QCheckBox/QToolButton · select-to-redact → QPushButton + QCheckBox<br>\n        send out → QVBoxLayout: primary QPushButton (copy), QToolButton disclosure preview, fenced key QGroupBox with reveal QPushButton<br>\n        restore → QVBoxLayout: editable QPlainTextEdit, QPushButton, read-only QPlainTextEdit result<br>\n        toast → transient QLabel overlay\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- toast -->\n<sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:#1d1c1a;color:#f2f1ef;padding:11px 20px;font-size:13px;font-weight:600;border:1px solid #000;z-index:50;\">{{ toast }}<\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:860}}\">\nclass Component extends DCLogic {\n  state = {\n    mode:'review', demo:'safe', selected:'person-a',\n    keyRevealed:false, cleartextOpen:false, previewOpen:false,\n    scanMisses:false, restored:false, keyNoteDismissed:false,\n    sendoutVisited:false, redactAdd:true, mapOpen:false, toast:'',\n    sugg:{ riverside:'awaiting', helix:'awaiting' }\n  };\n\n  ph(name){ const B=String.fromCharCode(123),E=String.fromCharCode(125); return React.createElement(React.Fragment,null,B,B,name,E,E); }\n  phStyled(name,style){ const B=String.fromCharCode(123),E=String.fromCharCode(125); return React.createElement('span',{style},B,B,name,E,E); }\n\n  toast(m){\n    this.setState({toast:m});\n    clearTimeout(this._t);\n    this._t = setTimeout(()=>this.setState({toast:''}), 2400);\n  }\n\n  get D(){\n    return {\n      removed:[\n        {id:'person-a', ph:'{{PERSON-A}}', val:'Jane', count:2, prov:'your list'},\n        {id:'project-a',ph:'{{PROJECT-A}}',val:'Apollo', count:3, prov:'your list'},\n        {id:'client-a', ph:'{{CLIENT-A}}', val:'Northwind', count:1, prov:'your list'},\n        {id:'email-1',  ph:'{{EMAIL-1}}',  val:'con…@…', count:1, prov:'email'},\n        {id:'phone-1',  ph:'{{PHONE-1}}',  val:'(415)…', count:1, prov:'phone'},\n        {id:'ssn-1',    ph:'{{SSN-1}}',    val:'•••-••-1234', count:1, prov:'ssn'},\n        {id:'ip-1',     ph:'{{IP-1}}',     val:'192.168…', count:1, prov:'ip'},\n        {id:'url-1',    ph:'{{URL-1}}',    val:'intra…/…', count:1, prov:'url'},\n        {id:'card-1',   ph:'{{CARD-1}}',   val:'••••4242', count:1, prov:'card'}\n      ],\n      suggestions:[\n        {id:'riverside', name:'Riverside', kind:'place', count:1},\n        {id:'helix',     name:'Helix',     kind:'org',   count:2}\n      ],\n      details:{\n        'person-a':{val:'Jane Okafor',kind:'Person',prov:'your declared list',ph:'{{PERSON-A}}',count:2,why:'Exact match in your declared terms list.',pre:'I told ',match:'Jane',post:' the timeline slips to Friday.'},\n        'project-a':{val:'Apollo',kind:'Project',prov:'your declared list',ph:'{{PROJECT-A}}',count:3,why:'Declared project name.',pre:'We need ',match:'Apollo',post:' shipped before the board meeting.'},\n        'client-a':{val:'Northwind',kind:'Client',prov:'your declared list',ph:'{{CLIENT-A}}',count:1,why:'Declared client name.',pre:'Loop in ',match:'Northwind',post:' on the revised SOW.'},\n        'email-1':{val:'connor@acme.co',kind:'Email',prov:'detector: email',ph:'{{EMAIL-1}}',count:1,why:'Matches the email-address detector.',pre:'Send the deck to ',match:'connor@acme.co',post:' tonight.'},\n        'phone-1':{val:'(415) 555-0132',kind:'Phone',prov:'detector: phone',ph:'{{PHONE-1}}',count:1,why:'Matches North-American phone detector.',pre:'Call ',match:'(415) 555-0132',post:' if the build breaks.'},\n        'ssn-1':{val:'•••-••-1234',kind:'SSN',prov:'detector: ssn',ph:'{{SSN-1}}',count:1,why:'Matches the US SSN pattern.',pre:'The SSN on file is ',match:'•••-••-1234',post:' for payroll.'},\n        'ip-1':{val:'192.168.4.21',kind:'IP address',prov:'detector: ip',ph:'{{IP-1}}',count:1,why:'Matches the IPv4 detector.',pre:'The staging box ',match:'192.168.4.21',post:' is unreachable.'},\n        'url-1':{val:'intranet.acme/run',kind:'URL',prov:'detector: url',ph:'{{URL-1}}',count:1,why:'Matches the URL detector (internal host).',pre:'Runbook lives at ',match:'intranet.acme/run',post:' internally.'},\n        'card-1':{val:'•••• 4242',kind:'Card',prov:'detector: card',ph:'{{CARD-1}}',count:1,why:'Matches the credit-card (Luhn) detector.',pre:'Card ending ',match:'4242',post:' was double-charged.'},\n        'riverside':{val:'Riverside',kind:'Place (model guess)',prov:'suggestion',ph:'(not removed)',propPh:'{{PLACE-A}}',isSugg:true,count:1,why:'Model guess — capitalized token resembling a place. Not in your list; nothing removed until you approve.',pre:'We met at the ',match:'Riverside',post:' office on Tuesday.'},\n        'helix':{val:'Helix',kind:'Org (model guess)',prov:'suggestion',ph:'(not removed)',propPh:'{{ORG-A}}',isSugg:true,count:2,why:'Model guess — looks like an organization. Not in your list; nothing removed until you approve.',pre:'Partnering with ',match:'Helix',post:' next quarter.'}\n      }\n    };\n  }\n\n  seg(active){ return `padding:4px 12px;border:none;border-right:1px solid #9a968f;background:${active?'#1d1c1a':'#e7e5e2'};color:${active?'#fff':'#3a3833'};font-size:11px;font-weight:${active?'700':'500'};cursor:pointer;`; }\n  tab(active){ return `flex:0 0 auto;padding:8px 20px;border:1px solid #b9b6b1;border-bottom:${active?'2px solid #f2f1ef':'1px solid #b9b6b1'};margin-bottom:-1px;background:${active?'#f2f1ef':'#dad7d1'};font-weight:${active?'700':'500'};font-size:13px;cursor:pointer;color:#1d1c1a;`; }\n\n  renderVals(){\n    const s = this.state, D = this.D, sel = s.selected;\n    const isUnsafe = s.demo==='unsafe', isEmpty = s.demo==='empty', isSafe = s.demo==='safe';\n\n    const removedRows = D.removed.map(r=>{\n      const unconfirmed = isUnsafe && r.id==='project-a';\n      return {\n        ...r, glyph:'▣', unconfirmed, confirmed:!unconfirmed,\n        rowStyle:`display:grid;grid-template-columns:18px 1fr auto auto;gap:10px;align-items:center;padding:7px 12px;border-bottom:1px solid #efece7;cursor:pointer;background:${sel===r.id?'#dde6f0':'transparent'};`,\n        onSelect:()=>this.setState({selected:r.id})\n      };\n    });\n\n    const suggRows = D.suggestions.map(r=>{\n      const st = s.sugg[r.id];\n      return {\n        ...r, glyph:'◇', status:st, decided:st!=='awaiting', pending:st==='awaiting',\n        statusLabel: st==='approved'?'approved · removed':(st==='rejected'?'kept in cleartext':'awaiting'),\n        rowStyle:`display:grid;grid-template-columns:18px 1fr auto;gap:10px;align-items:center;padding:8px 12px 8px 24px;border-bottom:1px solid #ece9e4;cursor:pointer;background:${sel===r.id?'#dde6f0':'transparent'};`,\n        onSelect:()=>this.setState({selected:r.id}),\n        onApprove:()=>{ this.setState(x=>({sugg:{...x.sugg,[r.id]:'approved'}})); this.toast('✔ Approved — '+r.name+' now removed'); },\n        onReject:()=>{ this.setState(x=>({sugg:{...x.sugg,[r.id]:'rejected'}})); this.toast('Kept in cleartext — '+r.name+' (still visible)'); }\n      };\n    });\n\n    const dd = D.details[sel];\n    const detail = dd ? {\n      has:true, value:dd.val, kind:dd.kind, prov:dd.prov,\n      occ: dd.count + (dd.count>1?' occurrences':' occurrence'),\n      why:dd.why, pre:dd.pre, match:dd.match, post:dd.post,\n      scrubPh: dd.isSugg ? dd.propPh : dd.ph,\n      afterLabel: dd.isSugg ? 'If approved' : 'After substitution'\n    } : {has:false};\n\n    return {\n      // mode / state flags\n      isReview: s.mode==='review', isSend: s.mode==='sendout', isRestore: s.mode==='restore',\n      isSafe, isUnsafe, isEmpty,\n      showReviewList: !isEmpty,\n      sendEnabled: !isUnsafe,\n      showDetail: !isUnsafe,\n      detailEmpty: !detail.has,\n\n      // tabs + demo segments\n      tabReview:this.tab(s.mode==='review'), tabSend:this.tab(s.mode==='sendout'), tabRestore:this.tab(s.mode==='restore'),\n      segSafe:this.seg(isSafe), segUnsafe:this.seg(isUnsafe), segEmpty:this.seg(isEmpty),\n      goReview:()=>this.setState({mode:'review'}),\n      goSend:()=>this.setState(x=>({mode:'sendout', sendoutVisited:true})),\n      goRestore:()=>this.setState({mode:'restore'}),\n      demoSafe:()=>this.setState({demo:'safe'}),\n      demoUnsafe:()=>this.setState({demo:'unsafe'}),\n      demoEmpty:()=>this.setState({demo:'empty'}),\n\n      // review data\n      removedRows, suggRows, detail,\n\n      // carets / glyphs\n      cleartextCaret: s.cleartextOpen?'▾':'▸',\n      cleartextOpen: s.cleartextOpen,\n      previewCaret: s.previewOpen?'▾':'▸',\n      previewOpen: s.previewOpen,\n      mapCaret: s.mapOpen?'▾':'▸',\n      mapOpen: s.mapOpen,\n      scanGlyph: s.scanMisses?'▣':'▢',\n      redactAddGlyph: s.redactAdd?'▣':'▢',\n\n      // key block\n      keyHidden: !s.keyRevealed, keyRevealed: s.keyRevealed,\n      showKeyNote: s.sendoutVisited && !s.keyNoteDismissed,\n\n      keyMap:[\n        {val:'Jane Okafor',    phEl:this.phStyled('PERSON-A',{color:'#1d1c1a'})},\n        {val:'Apollo',         phEl:this.phStyled('PROJECT-A',{color:'#1d1c1a'})},\n        {val:'Northwind',      phEl:this.phStyled('CLIENT-A',{color:'#1d1c1a'})},\n        {val:'connor@acme.co', phEl:this.phStyled('EMAIL-1',{color:'#1d1c1a'})},\n        {val:'(415) 555-0132', phEl:this.phStyled('PHONE-1',{color:'#1d1c1a'})}\n      ],\n      previewEl: React.createElement('span',null,\n        'I told ', this.ph('PERSON-A'), ' the timeline slips to ', this.ph('DATE-1'),\n        '. We need ', this.ph('PROJECT-A'), ' shipped for ', this.ph('CLIENT-A'),\n        '; reply to ', this.ph('EMAIL-1'), ' or call ', this.ph('PHONE-1'), '.'),\n      restoreEl: React.createElement(React.Fragment,null,\n        this.ph('PERSON-A'), ' agreed to ship ', this.ph('PROJECT-A'),\n        ' by Friday; loop in ', this.ph('ORG-A'), '.'),\n      orgEl: this.phStyled('ORG-A',{background:'#f3d9d4',borderBottom:'2px solid #b3261e',padding:'0 2px',fontFamily:'ui-monospace,Menlo,monospace',fontSize:'11.5px'}),\n      projEl: this.phStyled('PROJECT-A',{fontFamily:'ui-monospace,Menlo,monospace',fontWeight:700}),\n\n      // restore\n      restored: s.restored, notRestored: !s.restored,\n\n      // handlers\n      toggleCleartext:()=>this.setState(x=>({cleartextOpen:!x.cleartextOpen})),\n      togglePreview:()=>this.setState(x=>({previewOpen:!x.previewOpen})),\n      toggleMap:()=>this.setState(x=>({mapOpen:!x.mapOpen})),\n      toggleScan:()=>{ this.setState(x=>({scanMisses:!x.scanMisses})); this.toast(s.scanMisses?'Miss-scan off':'Scanning for misses…'); },\n      toggleRedactAdd:()=>this.setState(x=>({redactAdd:!x.redactAdd})),\n      revealKey:()=>this.setState(x=>({keyRevealed:!x.keyRevealed})),\n      dismissKeyNote:()=>this.setState({keyNoteDismissed:true}),\n      copyScrubbed:()=>this.toast('✔ Scrubbed text copied — safe to paste'),\n      copyKey:()=>this.toast('⚠ Secret key copied — never paste this into an LLM'),\n      copyTranscript:()=>this.toast('✔ Transcript copied'),\n      editList:()=>this.toast('Declared list editor (out of scope in test-fit)'),\n      approveAll:()=>this.toast('✔ Approved everything detected'),\n      redactKaren:()=>this.toast('✔ \"Karen\" redacted everywhere · added to your list'),\n      redactSel:()=>this.toast(s.redactAdd?'✔ Redacted everywhere · added to your list':'✔ Redacted everywhere'),\n      removeQ3:()=>this.toast('✔ \"Q3\" removed after all'),\n      doRestore:()=>this.setState({restored:true}),\n\n      toast: s.toast\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
